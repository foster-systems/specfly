# Specfly control-plane Worker.
# Secrets (APP_ID, PRIVATE_KEY, WEBHOOK_SECRET) are NEVER set here — they are
# provided via `.dev.vars` (local, gitignored) and `wrangler secret put` (remote).
name = "specfly"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — the GitHub App webhook target. `custom_domain = true` auto-provisions
# the DNS record + TLS cert (requires the specfly.dev zone on this Cloudflare account).
[[routes]]
pattern = "api.specfly.dev"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "specfly"
database_id = "a86cfe75-4321-4585-a3d0-49be85a41127"

# Daily TTL sweep of aged `runs` rows (see `scheduled` in src/index.ts).
[triggers]
crons = ["0 3 * * *"]

name: Specfly Apply

on:
  workflow_call:
    inputs:
      change:
        description: "OpenSpec change name to apply (defaults to the change/<name> branch)."
        required: false
        type: string
      head_sha:
        description: "Dispatched trigger sha to check out (detached) for determinism. Empty falls back to the change/<name> branch tip."
        required: false
        default: ""
        type: string
      model:
        description: "Claude model (e.g. sonnet, opus)."
        required: false
        default: sonnet
        type: string
      effort:
        description: "Thinking effort: low | medium | high."
        required: false
        default: high
        type: string
    secrets:
      anthropic_api_key:
        required: true

jobs:
  apply:
    concurrency:
      group: specfly-apply-${{ inputs.change }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.anthropic_api_key }}
    steps:
      - name: Verify ANTHROPIC_API_KEY is set
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY was not passed to the reusable workflow. Pass it under 'secrets:' in your caller workflow (or use 'secrets: inherit')." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Dispatch runs the default-branch definition, so resolve the ref: head_sha (detached), else the change/<name> tip, else github.ref.
          ref: ${{ inputs.head_sha != '' && inputs.head_sha || (inputs.change != '' && format('refs/heads/change/{0}', inputs.change) || github.ref) }}

      - name: Resolve change name
        id: change
        env:
          INPUT_CHANGE: ${{ inputs.change }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          name="${INPUT_CHANGE}"
          if [ -z "${name}" ]; then
            case "${REF_NAME}" in
              change/*) name="${REF_NAME#change/}" ;;
              *) echo "::error::No 'change' input given and branch '${REF_NAME}' is not 'change/<name>'." >&2; exit 1 ;;
            esac
          fi
          if [ ! -d "openspec/changes/${name}" ]; then
            echo "::error::No directory found at openspec/changes/${name}/" >&2
            exit 1
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Claude Code and OpenSpec CLIs
        run: npm install -g @anthropic-ai/claude-code @fission-ai/openspec@latest

      - name: Configure git identity
        run: |
          # 287375800 is the Specfly App's real bot user id; cosmetic attribution only (no Verified badge; push sender stays github-actions[bot]).
          git config user.name "specfly[bot]"
          git config user.email "287375800+specfly[bot]@users.noreply.github.com"

      - name: Run /opsx:apply
        id: apply
        continue-on-error: true
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
          MODEL: ${{ inputs.model }}
          EFFORT: ${{ inputs.effort }}
        run: |
          set -o pipefail
          {
            printf 'model: %s\n' "${MODEL}"
            printf 'effort: %s\n' "${EFFORT}"
            printf -- '---\n'
          } > apply.log
          PROMPT="$(cat <<EOF
          Provision this project's environment before applying — do it in a sub-agent (the Task tool) so its install output stays out of your main context.
          Tell the sub-agent to: read the repo's native CLAUDE.md / AGENTS.md (and any files they reference) for setup guidance; install the toolchain and dependencies the project needs; and report back a short summary with the STATELESS command(s) to run its tests/build (for example 'uv run pytest', '.venv/bin/pytest', or 'pnpm test'). Shell state — activated venvs, exported variables, PATH edits — does NOT persist across your Bash calls, so rely on stateless invocations like those.
          Setup is best-effort and fail-open: if the environment cannot be fully provisioned, proceed anyway and apply what you can, so the branch is still pushed for human review.
          Then run: /opsx:apply ${CHANGE_NAME}
          Finally, verify your work best-effort using the run recipe the sub-agent reported.
          EOF
          )"
          claude --dangerously-skip-permissions \
            --model "${MODEL}" \
            --effort "${EFFORT}" \
            --output-format stream-json --verbose \
            -p "${PROMPT}" 2>&1 \
            | tee -a apply.jsonl \
            | jq --unbuffered -r '
                def tool_summary:
                  . as $tu | ($tu.input // {}) as $i |
                  if   $tu.name == "Bash"      then "→ Bash $ \(($i.command // "?") | gsub("\n"; " ↵ "))"
                  elif $tu.name == "Read"      then "→ Read \($i.file_path // "?")"
                  elif $tu.name == "Edit"      then "→ Edit \($i.file_path // "?")"
                  elif $tu.name == "MultiEdit" then "→ MultiEdit \($i.file_path // "?") (\(($i.edits // []) | length) edits)"
                  elif $tu.name == "Write"     then "→ Write \($i.file_path // "?")"
                  elif $tu.name == "Grep"      then "→ Grep \"\($i.pattern // "?")\"\(if $i.path then " in \($i.path)" else "" end)"
                  elif $tu.name == "Glob"      then "→ Glob \($i.pattern // "?")"
                  elif $tu.name == "WebFetch"  then "→ WebFetch \($i.url // "?")"
                  elif $tu.name == "WebSearch" then "→ WebSearch \"\($i.query // "?")\""
                  elif $tu.name == "Task"      then "→ Task[\($i.subagent_type // "general")] \($i.description // "?")"
                  elif $tu.name == "TodoWrite" then "→ TodoWrite (\(($i.todos // []) | length) items)"
                  else "→ \($tu.name) \(($i | tostring)[0:200])" end;
                if .type == "system" and .subtype == "init" then
                  "[init] model=\(.model // "?") cwd=\(.cwd // "?")"
                elif .type == "assistant" then
                  (.message.content // []) | map(
                    if .type == "text" then .text
                    elif .type == "tool_use" then tool_summary
                    else empty end
                  ) | join("\n")
                elif .type == "result" then
                  "[done] subtype=\(.subtype // "?") cost_usd=\(.total_cost_usd // .cost_usd // 0)"
                else empty end
              ' \
            | tee -a apply.log
          status="${PIPESTATUS[0]}"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "${status}"

      - name: Validate change
        id: validate
        continue-on-error: true
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
        run: |
          set -o pipefail
          openspec validate "${CHANGE_NAME}" 2>&1 | tee validate.log
          exit "${PIPESTATUS[0]}"

      - name: Commit and push change branch
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
          BRANCH: change/${{ steps.change.outputs.name }}
        run: |
          set -euo pipefail
          git add -A
          git reset -- apply.jsonl apply.log validate.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            # Subject must not start with /spec:apply, or the backend re-dispatches and loops.
            git commit -m "opsx:apply ${CHANGE_NAME}"
            # No --force: a diverged branch tip fails closed rather than clobbering newer human commits.
            if ! git push origin "HEAD:refs/heads/${BRANCH}"; then
              echo "::error::Push to ${BRANCH} rejected (non-fast-forward): the branch tip diverged from the checked-out sha during the apply, so newer commits would be overwritten. Failing closed without force-pushing — re-trigger /spec:apply to apply against the current tip." >&2
              exit 1
            fi
          fi

      - name: Report apply & validation outcome
        if: always()
        env:
          APPLY_EXIT: ${{ steps.apply.outputs.exit_code }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          CHANGE_NAME: ${{ steps.change.outputs.name }}
        run: |
          apply_exit="${APPLY_EXIT:-unknown}"
          validate_outcome="${VALIDATE_OUTCOME:-unknown}"
          if [ "${apply_exit}" = "0" ]; then
            apply_status="✅ success"
          else
            apply_status="⚠️ failed (exit ${apply_exit})"
          fi
          if [ "${validate_outcome}" = "success" ]; then
            validate_status="✅ success"
          else
            validate_status="⚠️ ${validate_outcome}"
          fi
          {
            echo "## Specfly apply — ${CHANGE_NAME}"
            echo ""
            echo "| Step | Outcome |"
            echo "| --- | --- |"
            echo "| /opsx:apply | ${apply_status} |"
            echo "| openspec validate | ${validate_status} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${apply_exit}" != "0" ]; then
            echo "::warning::/opsx:apply exited ${apply_exit} for change '${CHANGE_NAME}'. The branch was still pushed for review."
          fi
          if [ "${validate_outcome}" != "success" ]; then
            echo "::warning::openspec validate '${CHANGE_NAME}' did not succeed (${validate_outcome}). The branch was still pushed for review."
          fi

      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: specfly-apply-${{ steps.change.outputs.name || 'unresolved' }}
          path: |
            apply.jsonl
            apply.log
            validate.log
          if-no-files-found: ignore
          retention-days: 14

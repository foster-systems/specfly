# Specfly — reusable apply workflow (workflow_call)
#
# STATUS: dispatch → apply → push handshake is wired, and hardened — the checkout
# prefers the dispatched head_sha (deterministic under concurrent pushes, with a
# fail-closed non-force push), and apply/validate outcomes are reported to the job
# summary and as annotations. The Claude Code invocation is settled (see DESIGN.md).
#
# Adopters don't edit this — they reference it from a thin caller workflow
# triggered by repository_dispatch from the Specfly backend. See
# examples/adopter-workflow.yml.
#
# Division of labour: the runner CODES and PUSHES the change branch (using the
# job's built-in GITHUB_TOKEN, contents:write). The Specfly App/backend opens the
# PR as Specfly[bot] — a separate actor, so you can approve it and CI triggers.
#
# Manual end-to-end test (gated on the App + backend existing; run once they do).
# In a test adopter repo with the App installed, the backend deployed, and a
# protected main:
#   1. Push a commit whose subject starts with "/spec:apply <name>".
#   2. Backend fires repository_dispatch (type specfly-apply) → this workflow runs.
#   3. Confirm Checkout lands on change/<name> (NOT the default branch).
#   4. /opsx:apply runs and pushes a commit with subject "opsx:apply <name>".
#   5. Backend's push webhook opens/updates the PR as Specfly[bot].
#   6. Confirm NO dispatch loop (the result subject is not /spec:apply).

name: Specfly Apply

on:
  workflow_call:
    inputs:
      change:
        description: "OpenSpec change name to apply (defaults to the change/<name> branch)."
        required: false
        type: string
      head_sha:
        description: "Dispatched trigger sha to check out (detached) for determinism. Empty falls back to the change/<name> branch tip."
        required: false
        default: ""
        type: string
      model:
        description: "Claude model (e.g. sonnet, opus)."
        required: false
        default: sonnet
        type: string
      effort:
        description: "Thinking effort: low | medium | high."
        required: false
        default: high
        type: string
    secrets:
      anthropic_api_key:
        required: true

jobs:
  apply:
    # Latest apply wins. Each /spec:apply commit re-dispatches a fresh caller
    # run; this job-level group coalesces all of them per change so a newer
    # trigger cancels the in-flight apply BEFORE its "Commit and push" step — the
    # stale run never clobbers the branch. The guard lives here (the reusable
    # workflow) so every @v1 adopter inherits it without editing their caller.
    # Keyed on inputs.change (passed by the caller from client_payload.change),
    # which is reliably available in the called-workflow context — unlike
    # github.event.client_payload.*, whose resolution here is not guaranteed.
    concurrency:
      group: specfly-apply-${{ inputs.change }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write # push the change branch; the main ruleset fences off main
    env:
      ANTHROPIC_API_KEY: ${{ secrets.anthropic_api_key }}
      # Corepack auto-provisions pnpm from package.json#packageManager on first
      # use; in CI (non-interactive) skip the download confirmation prompt.
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    steps:
      - name: Verify ANTHROPIC_API_KEY is set
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY was not passed to the reusable workflow. Pass it under 'secrets:' in your caller workflow (or use 'secrets: inherit')." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # repository_dispatch runs this workflow AS DEFINED ON THE DEFAULT
          # BRANCH, so github.ref/github.ref_name point at the default branch —
          # NOT change/<name>. Resolve the ref by preference (Actions evaluates
          # `A && B || C` as a ternary, nested here):
          #   1. inputs.head_sha — the dispatched trigger sha; checked out as a
          #      DETACHED HEAD so /opsx:apply runs against the exact tree the
          #      backend saw (deterministic under concurrent pushes to the branch).
          #   2. else refs/heads/change/<name> — the branch tip, where
          #      openspec/changes/<name>/ exists (older callers that don't pass
          #      head_sha land here; backward-compatible).
          #   3. else github.ref — a direct change/* push that passes no input.
          # fetch-depth: 0 is kept so the bare head_sha is fetchable.
          ref: ${{ inputs.head_sha != '' && inputs.head_sha || (inputs.change != '' && format('refs/heads/change/{0}', inputs.change) || github.ref) }}

      - name: Resolve change name
        id: change
        env:
          INPUT_CHANGE: ${{ inputs.change }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          name="${INPUT_CHANGE}"
          if [ -z "${name}" ]; then
            case "${REF_NAME}" in
              change/*) name="${REF_NAME#change/}" ;;
              *) echo "::error::No 'change' input given and branch '${REF_NAME}' is not 'change/<name>'." >&2; exit 1 ;;
            esac
          fi
          if [ ! -d "openspec/changes/${name}" ]; then
            echo "::error::No directory found at openspec/changes/${name}/" >&2
            exit 1
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      # Mirrors remcc's precedence: a declared package.json#packageManager is
      # authoritative; otherwise a lone bun lockfile -> bun; pnpm must declare a
      # version (Corepack provisions the exact pnpm from packageManager).
      - name: Resolve package manager
        id: pm
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "::error::package.json not found at repo root (Specfly supports pnpm- or bun-managed repos only)." >&2
            exit 1
          fi
          pm="$(jq -r '.packageManager // empty' package.json)"
          case "${pm}" in
            pnpm@*) name=pnpm ;;
            bun@*)  name=bun ;;
            "")
              if [ -f bun.lock ] || [ -f bun.lockb ]; then
                name=bun
              else
                echo "::error::Set package.json#packageManager to 'pnpm@<version>' or 'bun@<version>'." >&2
                exit 1
              fi ;;
            *) echo "::error::Unsupported packageManager '${pm}' (must start with 'pnpm@' or 'bun@')." >&2; exit 1 ;;
          esac
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "Resolved package manager: ${name}"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      # Provision pnpm via Corepack (bundled with Node) instead of the
      # pnpm/action-setup action. That action is a third-party download from
      # codeload's git-archive CDN — a single-attempt, no-retry "Set up job" step
      # that has flaked with intermittent 404s and stalls EVERY adopter apply
      # before it starts. Corepack fetches the exact pnpm pinned in
      # package.json#packageManager from the npm registry instead. Upgrading to
      # corepack@latest first avoids the stale signing-key ("keyid") errors that
      # Node's bundled corepack hits on recent pnpm releases.
      - name: Enable pnpm via Corepack
        if: steps.pm.outputs.name == 'pnpm'
        run: |
          npm install -g corepack@latest
          corepack enable
      # Install bun from its official script rather than oven-sh/setup-bun. As
      # with pnpm/action-setup above, GitHub downloads EVERY referenced action at
      # "Set up job" time regardless of the `if:` (all actions are fetched up
      # front), so that third-party action's flaky codeload download stalls even
      # pnpm-only adopters before any step runs. A run-step install from bun.sh
      # keeps third-party action downloads off the critical path. Installs latest
      # (parity with the action's prior no-version default); the lockfile pins the
      # dependency set via --frozen-lockfile regardless.
      - name: Install bun
        if: steps.pm.outputs.name == 'bun'
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "${HOME}/.bun/bin" >> "$GITHUB_PATH"

      - name: Install Claude Code and OpenSpec CLIs
        run: npm install -g @anthropic-ai/claude-code @fission-ai/openspec@latest

      - name: Install workspace dependencies
        run: ${{ steps.pm.outputs.name }} install --frozen-lockfile

      - name: Configure git identity
        run: |
          # COSMETIC commit attribution ONLY. 287375800 is the registered Specfly
          # App's real, fixed bot user id (hardcoded, no placeholder). This sets
          # the commit author/committer and nothing else. It deliberately does NOT:
          #   - make commits GPG-"Verified" (only API-authored commits are), and
          #   - change the webhook `sender` of the result push. That push is
          #     authenticated by GITHUB_TOKEN, so the backend ALWAYS sees it as
          #     sender == github-actions[bot] — which is exactly what its
          #     result-detection keys on. Do NOT "fix" this with a PAT/App token to
          #     change the sender or chase a "Verified" badge.
          git config user.name "specfly[bot]"
          git config user.email "287375800+specfly[bot]@users.noreply.github.com"

      - name: Run /opsx:apply
        id: apply
        continue-on-error: true
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
          MODEL: ${{ inputs.model }}
          EFFORT: ${{ inputs.effort }}
        run: |
          set -o pipefail
          # Header records the model/effort this run used. Unlike remcc, Specfly
          # receives model/effort as workflow inputs, so there's no "(source: …)"
          # annotation — the values are recorded as-is.
          {
            printf 'model: %s\n' "${MODEL}"
            printf 'effort: %s\n' "${EFFORT}"
            printf -- '---\n'
          } > apply.log
          # Stream NDJSON to apply.jsonl (full raw audit trail) and a
          # human-readable distillation to apply.log + the Actions console, so
          # you can watch the agent work live. The jq tool_summary function is
          # ported verbatim from remcc (templates/workflows/opsx-apply.yml):
          # each tool line surfaces its key input rather than just the name.
          claude --dangerously-skip-permissions \
            --model "${MODEL}" \
            --effort "${EFFORT}" \
            --output-format stream-json --verbose \
            -p "/opsx:apply ${CHANGE_NAME}" 2>&1 \
            | tee -a apply.jsonl \
            | jq --unbuffered -r '
                def tool_summary:
                  . as $tu | ($tu.input // {}) as $i |
                  if   $tu.name == "Bash"      then "→ Bash $ \(($i.command // "?") | gsub("\n"; " ↵ "))"
                  elif $tu.name == "Read"      then "→ Read \($i.file_path // "?")"
                  elif $tu.name == "Edit"      then "→ Edit \($i.file_path // "?")"
                  elif $tu.name == "MultiEdit" then "→ MultiEdit \($i.file_path // "?") (\(($i.edits // []) | length) edits)"
                  elif $tu.name == "Write"     then "→ Write \($i.file_path // "?")"
                  elif $tu.name == "Grep"      then "→ Grep \"\($i.pattern // "?")\"\(if $i.path then " in \($i.path)" else "" end)"
                  elif $tu.name == "Glob"      then "→ Glob \($i.pattern // "?")"
                  elif $tu.name == "WebFetch"  then "→ WebFetch \($i.url // "?")"
                  elif $tu.name == "WebSearch" then "→ WebSearch \"\($i.query // "?")\""
                  elif $tu.name == "Task"      then "→ Task[\($i.subagent_type // "general")] \($i.description // "?")"
                  elif $tu.name == "TodoWrite" then "→ TodoWrite (\(($i.todos // []) | length) items)"
                  else "→ \($tu.name) \(($i | tostring)[0:200])" end;
                if .type == "system" and .subtype == "init" then
                  "[init] model=\(.model // "?") cwd=\(.cwd // "?")"
                elif .type == "assistant" then
                  (.message.content // []) | map(
                    if .type == "text" then .text
                    elif .type == "tool_use" then tool_summary
                    else empty end
                  ) | join("\n")
                elif .type == "result" then
                  "[done] subtype=\(.subtype // "?") cost_usd=\(.total_cost_usd // .cost_usd // 0)"
                else empty end
              ' \
            | tee -a apply.log
          # PIPESTATUS[0] is the agent's real exit code. Exit with it (under
          # continue-on-error) so the STEP reflects the true outcome — red-but-
          # continued on agent failure — while the job stays green and the
          # branch still pushes. The report below still reads exit_code.
          status="${PIPESTATUS[0]}"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "${status}"

      - name: Validate change
        id: validate
        continue-on-error: true
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
        run: |
          set -o pipefail
          # tee combined output to validate.log so a failing validation is
          # visible live and preserved as an artifact (it ran silently before).
          # continue-on-error keeps steps.validate.outcome driving the report
          # without failing the job; exiting PIPESTATUS[0] makes that outcome
          # reflect the real validate result.
          openspec validate "${CHANGE_NAME}" 2>&1 | tee validate.log
          exit "${PIPESTATUS[0]}"

      - name: Commit and push change branch
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
          BRANCH: change/${{ steps.change.outputs.name }}
        run: |
          set -euo pipefail
          git add -A
          # Runner-local logs are uploaded as the agent-logs artifact; keep all
          # three (apply.jsonl, apply.log, validate.log) out of the result commit.
          git reset -- apply.jsonl apply.log validate.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            # Subject MUST stay "opsx:apply <name>" — it must NOT start with
            # /spec:apply, which the backend would classify as a new trigger
            # and re-dispatch, looping. The runner-local logs (apply.jsonl,
            # apply.log, validate.log) are excluded above so they never land in
            # the result commit.
            git commit -m "opsx:apply ${CHANGE_NAME}"
            # Pushed via the job's GITHUB_TOKEN (actions/checkout's default
            # persist-credentials: true; no custom push token). Deliberately NO
            # --force/--force-with-lease: when head_sha was checked out and the
            # branch tip has since moved, the result is not a fast-forward and
            # this push is REJECTED. That fail-closed behavior is intentional — we
            # refuse to clobber newer human commits. The concurrency guard
            # supersedes in-flight applies, so divergence is the rare exception.
            if ! git push origin "HEAD:refs/heads/${BRANCH}"; then
              echo "::error::Push to ${BRANCH} rejected (non-fast-forward): the branch tip diverged from the checked-out sha during the apply, so newer commits would be overwritten. Failing closed without force-pushing — re-trigger /spec:apply to apply against the current tip." >&2
              exit 1
            fi
          fi
          # Implicit push → PR-open handshake; there is NO runner → backend
          # callback. This push — observed by GitHub as sender github-actions[bot]
          # (the GITHUB_TOKEN actor, NOT specfly[bot]) — is the signal the Specfly
          # backend's `push` webhook handler uses to open/update the PR as
          # Specfly[bot], a separate actor so the PR is approvable and CI triggers.
          # The runner deliberately does NOT open the PR.

      - name: Report apply & validation outcome
        if: always()
        env:
          APPLY_EXIT: ${{ steps.apply.outputs.exit_code }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          CHANGE_NAME: ${{ steps.change.outputs.name }}
        run: |
          # Observability ONLY. This step does NOT gate the push and does NOT
          # fail the job: apply + validate keep continue-on-error, the branch is
          # pushed regardless, and the run stays green unless an infra step errors.
          # It consumes steps.apply.outputs.exit_code (produced earlier but
          # previously unread) and steps.validate.outcome, surfacing both to the
          # job summary and as ::warning annotations when either failed.
          apply_exit="${APPLY_EXIT:-unknown}"
          validate_outcome="${VALIDATE_OUTCOME:-unknown}"
          if [ "${apply_exit}" = "0" ]; then
            apply_status="✅ success"
          else
            apply_status="⚠️ failed (exit ${apply_exit})"
          fi
          if [ "${validate_outcome}" = "success" ]; then
            validate_status="✅ success"
          else
            validate_status="⚠️ ${validate_outcome}"
          fi
          {
            echo "## Specfly apply — ${CHANGE_NAME}"
            echo ""
            echo "| Step | Outcome |"
            echo "| --- | --- |"
            echo "| /opsx:apply | ${apply_status} |"
            echo "| openspec validate | ${validate_status} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${apply_exit}" != "0" ]; then
            echo "::warning::/opsx:apply exited ${apply_exit} for change '${CHANGE_NAME}'. The branch was still pushed for review."
          fi
          if [ "${validate_outcome}" != "success" ]; then
            echo "::warning::openspec validate '${CHANGE_NAME}' did not succeed (${validate_outcome}). The branch was still pushed for review."
          fi

      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: specfly-apply-${{ steps.change.outputs.name || 'unresolved' }}
          path: |
            apply.jsonl
            apply.log
            validate.log
          if-no-files-found: ignore
          retention-days: 14
